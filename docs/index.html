<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Quinua</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>

  <main id="libro">
    <!-- ===================== -->
    <!-- PORTADA -->
    <!-- ===================== -->
    <section class="pagina portada">
      <div class="header">
        <img src="img/untrm.png" class="logo-left" alt="UNTRM" />
        <img src="img/ceigras_logo.jpeg" class="logo-right" alt="CEIGRAS" />
      </div>

      <div class="hero">
        <img src="img/quinua1.jpeg" class="bg" alt="Portada quinua" />
        <div class="overlay"></div>

        <div class="contenido">
          <p class="mini">CATÁLOGO DE</p>
          <div class="linea"></div>
          <h1>QUINUA</h1>
          <div class="linea"></div>
          <p class="sub">DEL BANCO DE GERMOPLASMA DE LA UNTRM</p>
        </div>
      </div>
    </section>

    <!-- ===================== -->
    <!-- SEGUNDA HOJA -->
    <!-- ===================== -->
    <section class="pagina segunda-hoja">
      <img src="img/quinua2.jpeg" class="fondo-segunda" alt="Quinua 2" />
      <div class="capa-azul"></div>

      <div class="contenido-segunda">
        <p class="encabezado-superior">
          UNIVERSIDAD NACIONAL TORIBIO RODRÍGUEZ DE MENDOZA DE AMAZONAS<br />
          CENTRO DE INVESTIGACIÓN<br />
          EN GRANOS Y SEMILLAS CEIGRAS
        </p>

        <div class="bloque-titulo">
          <p class="catalogo">CATÁLOGO DE</p>
          <div class="linea linea-centro"></div>
          <h1 class="titulo-segunda">QUINUA</h1>
          <div class="linea linea-centro"></div>
          <p class="subtitulo">DEL BANCO DE GERMOPLASMA DE LA UNTRM</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SHEET_ID = "1Rq304iX6UYhdvwDt7oaQHAIpIgtWKvEJb3WreFOw0Fw";
    const SHEET_NAME = "STable1";
    const SHEET_URL =
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tqx=out:json`;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }


    /* Crea un ID seguro para cada ficha usando el código de accesión.
       Ejemplo: UNTRM-367-1005 -> UNTRM-367-1005 */
    function crearIdFicha(codigo) {
      return String(codigo || "SIN-CODIGO")
        .trim()
        .replace(/\s+/g, "-")
        .replace(/[^a-zA-Z0-9_-]/g, "-");
    }

    function irAFichaPorHash() {
      if (!window.location.hash) return;

      const id = decodeURIComponent(window.location.hash.substring(1));
      const ficha = document.getElementById(id);

      if (ficha) {
        ficha.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function normalizeKey(text) {
      return String(text || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, " ");
    }

    function getCellValue(cell) {
      if (!cell) return "";
      return cell.v ?? "";
    }

    function getHeaderName(col, index) {
      return normalizeKey(col.label || col.id || `COL_${index}`);
    }

    function rowToObject(headers, row) {
      const obj = {};
      headers.forEach((header, index) => {
        obj[header] = getCellValue(row.c?.[index]);
      });
      return obj;
    }

    function getField(item, ...names) {
      for (const name of names) {
        const key = normalizeKey(name);
        const value = item[key];
        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return value;
        }
      }
      return "";
    }

    function contarCamposConInfo(item) {
      let total = 0;
      for (const key in item) {
        const value = item[key];
        if (value !== null && value !== undefined && String(value).trim() !== "") {
          total += 1;
        }
      }
      return total;
    }

    function renderDescriptor(nombre, valor) {
      if (valor === null || valor === undefined || String(valor).trim() === "") {
        return "";
      }

      return `
        <tr>
          <td class="desc-label">${nombre}</td>
          <td class="desc-value">${valor}</td>
        </tr>
      `;
    }

    function renderImageBox(src, alt) {
      if (!src || String(src).trim() === "") {
        return `
          <div class="foto-vacia">
            <span>Sin imagen</span>
          </div>
        `;
      }

      return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" />`;
    }

    /* ===================================== */
    /* DICCIONARIO TÉCNICO AGRÍCOLA */
    /* ===================================== */

    const diccionarioAgricola = {
      "loose": "laxa",
      "compact": "compacta",
      "intermediate": "intermedia",
      "erect": "erecto",
      "semi-erect": "semierecto",
      "prostrate": "postrado",
      "present": "presente",
      "absent": "ausente",
      "white": "blanco",
      "yellow": "amarillo",
      "red": "rojo",
      "purple": "morado",
      "green": "verde",
      "brown": "marrón",
      "black": "negro",
      "cream": "crema",
      "oval": "ovalado",
      "elliptic": "elíptico",
      "round": "redondo",
      "amaranthiform": "amarantiforme",
      "glomerulate": "glomerulada",
      "sweet": "dulce",
      "bitter": "amarga",
      "valley quinoa": "quinua de valle",
      "mild": "leve",
      "moderate": "moderado",
      "severe": "severo",
      "green yellow": "verde amarillo",
      "light green": "verde claro",
      "dark green": "verde oscuro",
      "light red": "rojo claro",
      "dark red": "rojo oscuro"
    };

    /* ===================================== */
    /* UTILIDADES DE FORMATO */
    /* ===================================== */

    function capitalizar(texto) {
      if (!texto) return "";
      return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    /* ===================================== */
    /* TRADUCCIÓN AUTOMÁTICA INGLÉS -> ESPAÑOL */
    /* ===================================== */

    async function traducirTexto(texto) {
      if (texto === null || texto === undefined) return "";

      const limpio = String(texto).trim();
      if (!limpio) return "";

      const clave = limpio.toLowerCase();

      if (diccionarioAgricola[clave]) {
        return diccionarioAgricola[clave];
      }

      const pareceNumeroOMedida = /^[\d\s.,\-/%]+([a-zA-Z.°]+)?$/;
      const pareceCodigo = /^[A-Z0-9_-]+$/;

      if (pareceNumeroOMedida.test(limpio) || pareceCodigo.test(limpio)) {
        return limpio;
      }

      try {
        const res = await fetch(
          "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q=" +
          encodeURIComponent(limpio)
        );

        const data = await res.json();
        const traduccion = data?.[0]?.map(parte => parte[0]).join("") || limpio;
        const claveTraducida = String(traduccion).trim().toLowerCase();

        if (diccionarioAgricola[claveTraducida]) {
          return diccionarioAgricola[claveTraducida];
        }

        return traduccion;
      } catch (e) {
        return limpio;
      }
    }

    async function traducirSiTexto(valor) {
      const traducido = await traducirTexto(valor);
      return capitalizar(traducido);
    }

    async function createFicha(item, numeroPagina) {
      const codigo = getField(item, "UNTRM code", "UNTRM CODE", "CODE");
      const idFicha = crearIdFicha(codigo);

      const image1 = getField(item, "image_panoja", "IMAGE_PANOJA");
      const image2 = getField(item, "image_seed", "IMAGE_SEED");
      const image3 = getField(item, "image_3", "IMAGE_3");
      const image4 = getField(item, "image_4", "IMAGE_4");

      const tablaColeccion = [
        renderDescriptor("Nombre Científico", getField(item, "Nombre Científico") || "<em>Chenopodium quinoa</em> Willd."),
        renderDescriptor("Nombre Común", getField(item, "Nombre Común") || "Quinua"),
        renderDescriptor("Código UNTRM", codigo || "SIN CÓDIGO"),
        renderDescriptor(
          "Zona agroecológica",
          await traducirSiTexto(getField(item, "AGROECOLOGICAL ZONES", "agroecological zones")) || "Quinua de valle"
        ),
        renderDescriptor("Departamento", getField(item, "DEPARTAMENTO") || "Amazonas"),
        renderDescriptor("Provincia", getField(item, "PROVINCIA") || "Luya"),
        renderDescriptor("Distrito", getField(item, "DISTRITO") || "Lonya Chico"),
        renderDescriptor("Localidad", getField(item, "LOCALIDAD") || "EE. Lonya Chico"),
        renderDescriptor("Altitud", getField(item, "ALTITUD") || "2300 m.s.n.m.")
      ].join("");

      const tablaCuantitativos = [
        renderDescriptor("Número de días a 50% de floración", getField(item, "DF")),
        renderDescriptor("Contenido de clorofila al 50% de floración", getField(item, "SPAD")),
        renderDescriptor("Longitud de panoja (cm)", getField(item, "PL")),
        renderDescriptor("Diámetro de panoja (cm)", getField(item, "PD")),
        renderDescriptor("Número de días a 50% de madurez fisiológica", getField(item, "PM")),
        renderDescriptor("Altura de planta (cm)", getField(item, "PH")),
        renderDescriptor("Diámetro de tallo (mm)", getField(item, "SD")),
        renderDescriptor("Peso de 1000 semillas (g)", getField(item, "TSW")),
        renderDescriptor("Peso de 10 panojas (g)", getField(item, "PB")),
        renderDescriptor("Peso de semilla de 10 plantas (g)", getField(item, "SW")),
        renderDescriptor("Índice de cosecha (%)", getField(item, "HI")),
         renderDescriptor("Severidad de mildiu (%)", getField(item, "IPER"))
      ].join("");

      const tablaCualitativos = [
        renderDescriptor(
          "Color de panoja al 50% de floración",
          await traducirSiTexto(getField(item, "PCF"))
        ),
        renderDescriptor(
          "Color del tallo principal",
          await traducirSiTexto(getField(item, "MSC"))
        ),
        renderDescriptor(
          "Forma de panoja",
          await traducirSiTexto(getField(item, "PSH"))
        ),
        renderDescriptor(
          "Densidad de panoja",
          await traducirSiTexto(getField(item, "PDEN", "PDE"))
        ),
        renderDescriptor(
          "Color de panoja al 50% de madurez fisiológica",
          await traducirSiTexto(getField(item, "PCM"))
        ),
        renderDescriptor(
          "Hábito de crecimiento",
          await traducirSiTexto(getField(item, "GH"))
        ),
        renderDescriptor(
          "Grado de dehiscencia",
          await traducirSiTexto(getField(item, "DD"))
        ),
        renderDescriptor(
          "Acame",
          await traducirSiTexto(getField(item, "LOD"))
        ),
        renderDescriptor(
          "Color de episperma",
          await traducirSiTexto(getField(item, "SCC"))
        ),
        renderDescriptor(
          "Forma del grano",
          await traducirSiTexto(getField(item, "GS"))
        ),
        renderDescriptor(
          "Presencia de <i>Epicauta</i> sp.",
          await traducirSiTexto(getField(item, "EPI"))
        )
      ].join("");

      return `
        <section id="${idFicha}" class="pagina ficha-quinua ficha-organizada" data-codigo="${escapeHtml(codigo || "SIN CÓDIGO")}">
          <div class="ficha-wrap">
            <div class="marca-superior"></div>

            <div class="ficha-topbar">
              <div class="topbar-texto">Banco de Germoplasma de la UNTRM</div>
            </div>

            <div class="codigo-principal">${escapeHtml(codigo || "SIN CÓDIGO")}</div>

            <div class="ficha-grid">
              <!-- IZQUIERDA -->
              <div class="columna col-izq">
                <div class="cuadro cuadro-coleccion">
                  <div class="cuadro-titulo">DATOS DE COLECCIÓN</div>
                  <div class="cuadro-contenido">
                    <table class="tabla-descriptores">
                      <tbody>${tablaColeccion}</tbody>
                    </table>
                  </div>
                </div>

                <div class="bloque-imagen-vertical">
                  ${renderImageBox(image1, "Imagen 1")}
                </div>
              </div>

              <!-- CENTRO -->
              <div class="columna col-centro">
                <div class="fila-superior-imagenes">
                  <div class="imagen-top">${renderImageBox(image2, "Imagen 2")}</div>
                  <div class="imagen-top">${renderImageBox(image3, "Imagen 3")}</div>
                </div>

                <div class="cuadro cuadro-cuantitativos">
                  <div class="cuadro-titulo">DESCRIPTORES CUANTITATIVOS</div>
                  <div class="cuadro-contenido">
                    <table class="tabla-descriptores">
                      <tbody>${tablaCuantitativos}</tbody>
                    </table>
                  </div>
                </div>
              </div>

              <!-- DERECHA -->
              <div class="columna col-der">
                <div class="cuadro cuadro-cualitativos">
                  <div class="cuadro-titulo">DESCRIPTORES CUALITATIVOS</div>
                  <div class="cuadro-contenido">
                    <table class="tabla-descriptores">
                      <tbody>${tablaCualitativos}</tbody>
                    </table>
                  </div>
                </div>

                <div class="bloque-imagen-horizontal">
                  ${renderImageBox(image4, "Imagen 4")}
                </div>
              </div>
            </div>

            <div class="ficha-footer">
              <div class="footer-left">Catálogo de quinua del Banco de Germoplasma de la UNTRM</div>
              <div class="footer-page">${numeroPagina}</div>
            </div>
          </div>
        </section>
      `;
    }

    async function cargarDatos() {
      const response = await fetch(SHEET_URL);
      const raw = await response.text();
      const json = JSON.parse(raw.substring(47).slice(0, -2));

      const cols = json.table.cols || [];
      const rows = json.table.rows || [];

      const headers = cols.map(getHeaderName);
      return rows.map(row => rowToObject(headers, row));
    }

    async function iniciar() {
      try {
        const datos = await cargarDatos();
        const libro = document.getElementById("libro");
        let pagina = 3;

        for (const item of datos) {
          const totalConInfo = contarCamposConInfo(item);
          if (totalConInfo >= 5) {
            const fichaHtml = await createFicha(item, pagina);
            libro.insertAdjacentHTML("beforeend", fichaHtml);
            pagina += 1;
          }
        }

        // Si el usuario entra desde un QR, por ejemplo:
        // https://vyxugo.github.io/Cat/#UNTRM-367-1005
        // esta función lo lleva directo a la ficha correspondiente.
        setTimeout(irAFichaPorHash, 300);
      } catch (error) {
        console.error("Error al cargar la hoja:", error);
      }
    }

    window.addEventListener("hashchange", irAFichaPorHash);

    iniciar();
  </script>
</body>
</html>
